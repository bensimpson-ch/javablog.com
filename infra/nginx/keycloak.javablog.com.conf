limit_req_zone $binary_remote_addr zone=keycloak_login:10m rate=5r/s;

server {
    listen 80;
    listen [::]:80;
    server_name keycloak.javablog.com;
    return 302 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    ssl_certificate /home/ben/ssl/javablog.com/cloudflare.cert;
    ssl_certificate_key /home/ben/ssl/javablog.com/cloudflare.pem;

    server_name keycloak.javablog.com;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Block admin console access on this domain
    location /admin {
        return 403;
    }

    # Block master realm access
    location /realms/master {
        return 403;
    }

    location = / {
        return 302 /realms/javablog/account/;
    }

    # Rate limit login endpoints
    location ~ ^/realms/javablog/protocol/openid-connect/(token|auth)$ {
        limit_req zone=keycloak_login burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://localhost:8180;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    location / {
        proxy_pass http://localhost:8180;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }
}
